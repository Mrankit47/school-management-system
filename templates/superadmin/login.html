<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin Login | School Conduct SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6 font-['Inter']">
    <div class="max-w-md w-full">
        <!-- Brand -->
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-2xl">
                <svg class="w-6 h-6 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
            <span class="text-xl font-bold text-white tracking-tight uppercase">SaaS Control Panel</span>
        </div>

        <!-- Login Card -->
        <div class="bg-slate-800 p-10 rounded-[2.5rem] shadow-2xl border border-slate-700">
            <h1 class="text-2xl font-bold text-white mb-8">Admin Authentication</h1>

            {% if messages %}
                {% for message in messages %}
                    <div class="mb-6 p-4 rounded-2xl bg-red-400/10 border border-red-400/20 text-sm font-bold text-red-400 flex items-center gap-3">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Username</label>
                    <input 
                        type="text" 
                        name="username" 
                        required
                        class="w-full px-6 py-4 bg-slate-900/50 border border-slate-700 rounded-2xl text-white font-bold placeholder:text-slate-600 outline-none focus:border-white/20 transition-all"
                    >
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Password</label>
                    <input 
                        type="password" 
                        name="password" 
                        required
                        class="w-full px-6 py-4 bg-slate-900/50 border border-slate-700 rounded-2xl text-white font-bold placeholder:text-slate-600 outline-none focus:border-white/20 transition-all"
                    >
                </div>
                
                <button type="submit" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-black text-lg hover:bg-slate-200 transition-all shadow-xl shadow-white/5 uppercase tracking-widest">
                    Enter Dashboard
                </button>
            </form>
        </div>
    </div>
</body>
</html>
